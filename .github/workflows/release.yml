name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Read manifest.json version
        id: manifest
        run: |
          VERSION=$(jq -r .version manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate Tag matches Manifest
        run: |
          if [ "${{ github.ref_name }}" != "${{ steps.manifest.outputs.version }}" ]; then
            echo "::error::Tag name '${{ github.ref_name }}' MUST exactly match manifest version '${{ steps.manifest.outputs.version }}'."
            exit 1
          fi

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes "New release of Core Habits" \
            --draft \
            main.js \
            manifest.json \
            styles.css
